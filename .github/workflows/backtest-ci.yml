name: backtest-ci

on:
  push:
  pull_request:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      PIP_ONLY_BINARY: ":all:"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync --frozen --extra backtest

      - name: Verify backtest imports
        run: uv run --extra backtest python -c "import bayes_opt, matplotlib, scipy, statsmodels; print('backtest imports OK')"

      - name: Lint (ruff)
        run: uv run ruff check src/backtest src/tests/backtest

      - name: Format check (ruff)
        run: uv run ruff format --check src/backtest src/tests/backtest

      - name: Type check (mypy)
        run: uv run --extra backtest mypy --config-file mypy_backtest.ini

      - name: Tests
        run: uv run --extra backtest pytest -q src/tests/backtest
